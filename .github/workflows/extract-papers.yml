name: Extract paper metadata

on:
  push:
    branches: [main]
    paths:
      - 'static/papers/**/*.pdf'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pymupdf anthropic
      - name: Run extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/extract_paper.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add content/research/
          git diff --cached --quiet || git commit -m "Auto-extract paper metadata"
          git push
